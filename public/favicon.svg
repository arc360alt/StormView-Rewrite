<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- App-icon style background -->
  <rect width="32" height="32" rx="7" fill="#1a2236"/>

  <!-- Sun rays (8 rays) -->
  <g stroke="#fbbf24" stroke-width="2" stroke-linecap="round">
    <line x1="11" y1="2"    x2="11" y2="5.5"/>
    <line x1="11" y1="16.5" x2="11" y2="20"/>
    <line x1="2"  y1="11"   x2="5.5" y2="11"/>
    <line x1="16.5" y1="11" x2="20"  y2="11"/>
    <line x1="4.5"  y1="4.5"  x2="6.8"  y2="6.8"/>
    <line x1="17.5" y1="4.5"  x2="15.2" y2="6.8"/>
    <line x1="4.5"  y1="17.5" x2="6.8"  y2="15.2"/>
    <line x1="15.2" y1="15.2" x2="17.5" y2="17.5"/>
  </g>

  <!-- Sun body -->
  <circle cx="11" cy="11" r="5.2" fill="#fbbf24"/>

  <!-- Cloud — drawn on top of the sun so it partially covers it -->
  <!-- Three bumps on top form the cloud silhouette -->
  <circle cx="19.5" cy="21"   r="5.5" fill="#94a3b8"/>
  <circle cx="25.5" cy="23"   r="4"   fill="#94a3b8"/>
  <circle cx="14.5" cy="23"   r="3.5" fill="#94a3b8"/>
  <!-- Fill rectangle closes the gaps between bumps and flattens the bottom -->
  <rect   x="14"   y="21"   width="16" height="7" rx="0" fill="#94a3b8"/>
</svg>
